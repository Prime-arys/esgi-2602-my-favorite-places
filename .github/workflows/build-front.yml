#
name: Create FRONT Docker image & publish it

# Configures this workflow to run every time a change is pushed to the branch called `main`.
on:
  push:
    branches: ["main"]
    # build une image pour back et front à chaque fois qu'on push une nouvelle version (tag) sur un commit
    tags:
      - "v*"
      - "*.*.*"
    paths:
      - client/**
  workflow_dispatch:

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-client

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      #
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          # ici, tout est déjà défini par github lui même, on n'a pas besoin de le redéfinir dans les secrets ou en variables d'environnement.
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # tags:
          # - Branch name (e.g., `main`, `feature-branch-1`)
          # - Semantic version (e.g., `1.0.0`) if present in the git tags
          # - "latest" tag for the default branch (e.g., `main`)
          # - git SHA (e.g., `sha-abc1234`)
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}},enable={{is_default_branch}}
            type=semver,pattern=v{{major}},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see [Using artifact attestations to establish provenance for builds](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds).
